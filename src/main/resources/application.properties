spring.application.name=bank
server.port=8081

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=your-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-please-change-this
app.jwt.expiration=86400000

# CORS
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Spring AI - OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key-here}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.embedding.options.model=text-embedding-3-small

# Telegram Bot
telegram.bot.token=${TELEGRAM_BOT_TOKEN:your-telegram-bot-token-here}
telegram.bot.username=${TELEGRAM_BOT_USERNAME:your_bot_username}
